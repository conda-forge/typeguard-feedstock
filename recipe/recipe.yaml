schema_version: 1

context:
  name: typeguard
  version: 4.5.2

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 5a16dcac23502039299c97c8941651bc33d7ea8cc4b2f7d6bbb1b528f6eea423

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - setuptools-scm >=6.4
    - pip
  run:
    - typing_extensions >=4.14.0
    - python >=${{ python_min }}
    - importlib-metadata >=3.6
  run_constraints:
    - pytest >=7

tests:
  - python:
      imports:
        - typeguard
      pip_check: false
      python_version: ${{ python_min }}
about:
  license: MIT
  license_file: LICENSE
  summary: Runtime type checker for Python
  description: |
    This library provides runtime type checking for functions defined with argument type annotations.
  homepage: https://github.com/agronholm/typeguard
  repository: https://github.com/agronholm/typeguard
  documentation: https://github.com/agronholm/typeguard

extra:
  recipe-maintainers:
    - jan-janssen
    - itamarst
    - agronholm
